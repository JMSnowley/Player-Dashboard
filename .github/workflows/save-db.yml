name: Save PLYRDASH Database

on:
  workflow_dispatch:
    inputs:
      payload:
        description: 'JSON database payload'
        required: true
        type: string

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write db.json
        run: |
          echo '${{ github.event.inputs.payload }}' > db.json

      - name: Commit and push
        run: |
          git config user.name "PLYRDASH Bot"
          git config user.email "plyrdash@bot.local"
          git add db.json
          git diff --staged --quiet || git commit -m "PLYRDASH db update $(date -u +%Y-%m-%dT%H:%M)"
          git push
